services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarmops-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/swarmops.db
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      FRONTEND_URL: http://localhost
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:3000,http://localhost:80,http://127.0.0.1:3000
    volumes:
      - swarmops-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swarmops-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  swarmops-data:
